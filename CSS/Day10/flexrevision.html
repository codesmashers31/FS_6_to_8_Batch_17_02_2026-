<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex</title>

  <style>
    .parent{
        background-color: white;
       
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        gap:10px
    }


    .child{

        background-color: white;
        color: black;
        width: 150px;
        height: 150px;
        display: flex;
        align-items: center;
        justify-content: center;

    }

    .cards{
        background-color: black;
        color: white;
        width: 300px;

        padding: 10px;

    display: flex;
    flex-direction: column;
    justify-content: start;
    align-items: start;
    border-radius: 10px;
    
    }

    .cards img {
        width: 250px;
        border-radius: 10px;
    
    
    }
  </style>

</head>
